version: "3.8"

# ═══════════════════════════════════════════════════════════════════
# Docker Compose — Neo4j pour l'Ontologie Maritime
# Usage : docker compose up -d
# Neo4j Browser : http://localhost:7474
# Bolt : bolt://localhost:7687
# ═══════════════════════════════════════════════════════════════════

services:
  neo4j:
    image: neo4j:5.18-community
    container_name: maritime_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP Browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
      - ./data/output:/var/lib/neo4j/import/ontology   # Mount output dir
    environment:
      NEO4J_AUTH: neo4j/CHANGE_ME   # ⚠️ Remplacer par votre mot de passe
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*,gds.*"
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "2g"
      NEO4J_server_memory_pagecache__size: "512m"
      # Activer le mode multi-db si besoin
      # NEO4J_dbms_default__database: maritime
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
